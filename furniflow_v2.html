<!DOCTYPE html>
<html lang="en">
<head>

    <style>

        .card { background: #1E1E32; border: 1px solid #3A3A5C; border-radius: 0.75rem; padding: 1.25rem; }
        .btn { padding: 0.5rem 1rem; border-radius: 0.5rem; font-weight: 500; cursor: pointer; border: none; transition: all 0.2s; display: inline-flex; align-items: center; gap: 0.5rem; }
        .btn-primary { background: linear-gradient(135deg, #E94560, #FF6B6B); color: white; }
        .btn-primary:hover { opacity: 0.9; }
        .btn-secondary { background: transparent; border: 1px solid #3A3A5C; color: white; }
        .btn-secondary:hover { border-color: #E94560; color: #E94560; }
        .btn-success { background: linear-gradient(135deg, #00D9A5, #00B388); color: white; }
        .btn-warning { background: linear-gradient(135deg, #F59E0B, #FBBF24); color: white; }
        .input { width: 100%; padding: 0.625rem 0.875rem; background: #0F0F1A; border: 1px solid #3A3A5C; border-radius: 0.5rem; color: white; }
        .input:focus { outline: none; border-color: #E94560; }
        .input:disabled { opacity: 0.6; cursor: not-allowed; }
        .select { width: 100%; padding: 0.625rem 0.875rem; background: #0F0F1A; border: 1px solid #3A3A5C; border-radius: 0.5rem; color: white; }
        .textarea { width: 100%; padding: 0.625rem 0.875rem; background: #0F0F1A; border: 1px solid #3A3A5C; border-radius: 0.5rem; color: white; resize: vertical; }
        .badge { display: inline-flex; align-items: center; gap: 0.25rem; padding: 0.25rem 0.625rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 500; }
        .badge-lead { background: #1E3A8A; color: #93C5FD; }
        .badge-interested { background: #713F12; color: #FCD34D; }
        .badge-converted { background: #14532D; color: #86EFAC; }
        .badge-not-interested { background: #374151; color: #9CA3AF; }
        .badge-lost { background: #7F1D1D; color: #FCA5A5; }
        .badge-pending { background: #713F12; color: #FCD34D; }
        .badge-assigned { background: #1E3A8A; color: #93C5FD; }
        .badge-accepted { background: #4C1D95; color: #C4B5FD; }
        .badge-in-progress { background: #9F5809; color: #FDE68A; }
        .badge-completed { background: #14532D; color: #86EFAC; }
        .badge-rescheduled { background: #BE185D; color: #FBCFE8; }
        .badge-overdue { background: #DC2626; color: white; }
        .badge-paid { background: #14532D; color: #86EFAC; }
        .badge-foc { background: #4C1D95; color: #C4B5FD; }
        .badge-pending-pay { background: #713F12; color: #FCD34D; }
        .badge-site { background: #0D9488; color: #5EEAD4; }
        .sidebar { position: fixed; left: 0; top: 0; height: 100vh; width: 16rem; background: #1A1A2E; border-right: 1px solid #3A3A5C; display: flex; flex-direction: column; z-index: 40; overflow-y: auto; }
        .main-content { margin-left: 16rem; min-height: 100vh; padding-bottom: 5rem; }
        .header { height: 4rem; background: #1A1A2E; border-bottom: 1px solid #3A3A5C; display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; position: sticky; top: 0; z-index: 30; }
        .nav-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.625rem 0.75rem; border-radius: 0.5rem; color: #9CA3AF; text-decoration: none; transition: all 0.2s; }
        .nav-item:hover { background: #2A2A44; color: white; }
        .nav-item.active { background: rgba(233, 69, 96, 0.1); color: #E94560; }
        .table { width: 100%; border-collapse: collapse; }
        .table th { text-align: left; padding: 0.75rem; font-size: 0.75rem; font-weight: 600; color: #9CA3AF; border-bottom: 1px solid #3A3A5C; text-transform: uppercase; }
        .table td { padding: 0.75rem; border-bottom: 1px solid #3A3A5C50; font-size: 0.875rem; }
        .table tr:hover { background: rgba(42, 42, 68, 0.3); }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 50; padding: 1rem; }
        .modal { background: #1E1E32; border: 1px solid #3A3A5C; border-radius: 1rem; width: 100%; max-width: 36rem; max-height: 90vh; overflow-y: auto; }
        .modal-header { padding: 1rem 1.5rem; border-bottom: 1px solid #3A3A5C; display: flex; align-items: center; justify-content: space-between; }
        .modal-body { padding: 1.5rem; }
        .modal-footer { padding: 1rem 1.5rem; border-top: 1px solid #3A3A5C; display: flex; gap: 0.75rem; justify-content: flex-end; }
        .form-group { margin-bottom: 1rem; }
        .form-label { display: block; font-size: 0.875rem; font-weight: 500; color: #9CA3AF; margin-bottom: 0.5rem; }
        .form-label .required { color: #E94560; }
        .avatar { width: 2rem; height: 2rem; border-radius: 50%; background: linear-gradient(135deg, #4DA8DA, #00D9A5); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.75rem; }
        .logo { width: 2.5rem; height: 2.5rem; border-radius: 0.5rem; background: linear-gradient(135deg, #E94560, #FF6B6B); display: flex; align-items: center; justify-content: center; }
        .stat-card { background: #1E1E32; border: 1px solid #3A3A5C; border-radius: 0.75rem; padding: 1rem; }
        .job-card { background: #1E1E32; border: 1px solid #3A3A5C; border-radius: 0.75rem; padding: 1rem; }
        .job-card:hover { border-color: #E94560; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 0.25rem; }
        .calendar-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 0.5rem; font-size: 0.75rem; cursor: pointer; padding: 0.25rem; }
        .calendar-day:hover { background: #2A2A44; }
        .calendar-day.today { background: #E94560; color: white; }
        .calendar-day.has-event { background: rgba(233, 69, 96, 0.2); }
        .calendar-day .event-dot { width: 0.375rem; height: 0.375rem; border-radius: 50%; background: #E94560; margin-top: 0.125rem; }
        .notification-dot { position: absolute; top: -0.25rem; right: -0.25rem; min-width: 1.25rem; height: 1.25rem; background: #E94560; border-radius: 50%; font-size: 0.625rem; display: flex; align-items: center; justify-content: center; padding: 0 0.25rem; }
        .flash-alert { position: fixed; top: 1rem; right: 1rem; background: linear-gradient(135deg, #F59E0B, #FBBF24); color: #000; padding: 1rem 1.5rem; border-radius: 0.75rem; z-index: 100; animation: slideIn 0.3s ease; box-shadow: 0 4px 20px rgba(245, 158, 11, 0.4); }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        .gps-indicator { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 0.75rem; background: rgba(0, 217, 165, 0.1); border-radius: 0.5rem; font-size: 0.75rem; color: #00D9A5; }
        .gps-indicator.inactive { background: rgba(107, 114, 128, 0.1); color: #9CA3AF; }
        .timeline { position: relative; padding-left: 1.5rem; }
        .timeline::before { content: ''; position: absolute; left: 0.5rem; top: 0; bottom: 0; width: 2px; background: #3A3A5C; }
        .timeline-item { position: relative; padding-bottom: 1rem; }
        .timeline-item::before { content: ''; position: absolute; left: -1.25rem; top: 0.25rem; width: 0.75rem; height: 0.75rem; border-radius: 50%; background: #E94560; border: 2px solid #1E1E32; }
        .filter-bar { display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center; }
        .filter-bar .input, .filter-bar .select { width: auto; min-width: 150px; }
        .tab-buttons { display: flex; gap: 0.5rem; border-bottom: 1px solid #3A3A5C; margin-bottom: 1rem; }
        .tab-btn { padding: 0.75rem 1rem; background: none; border: none; color: #9CA3AF; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; }
        .tab-btn.active { color: #E94560; border-bottom-color: #E94560; }
        .map-link { display: inline-flex; align-items: center; gap: 0.375rem; padding: 0.375rem 0.75rem; background: #1E3A8A; color: #93C5FD; border-radius: 0.375rem; font-size: 0.75rem; text-decoration: none; }
        .map-link:hover { background: #1E40AF; }
        .locked-field { background: rgba(233, 69, 96, 0.1); border-color: rgba(233, 69, 96, 0.3); }
        .locked-field::after { content: '\f023'; font-family: 'Font Awesome 6 Free'; font-weight: 900; position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%); color: #E94560; font-size: 0.75rem; }
        .required-indicator { color: #E94560; }
        .error-text { color: #EF4444; font-size: 0.75rem; margin-top: 0.25rem; }
        .empty-state { text-align: center; padding: 2rem; color: #9CA3AF; }
        @media (max-width: 768px) {
            .sidebar { width: 4rem; }
            .main-content { margin-left: 4rem; }
            .sidebar-text { display: none; }
            .hide-mobile { display: none; }
            .modal { max-width: 100%; margin: 0.5rem; }
            .filter-bar { flex-direction: column; align-items: stretch; }
            .filter-bar .input, .filter-bar .select { width: 100%; }
        }
    </style>
</head>
<body>

    <script>

                { id: 'l5', customerName: 'Michael Chen', phone: '+91 98765 55555', address: '654 Cedar Lane, Joliet', productCategory: 'Mattress', leadValue: 18000, leadDate: '2024-03-08', nextFollowUp: null, remarks: 'Lost to competitor', status: 'lost', createdBy: 'u6', isSiteLead: true, locked: true },

                { id: 'j1', leadId: 'l3', customerName: 'David Thompson', phone: '+91 98765 33333', address: '789 Pine Road, Naperville', productCategory: 'Bed', jobType: 'delivery', paymentStatus: 'paid', status: 'assigned', assignedTo: 'u4', createdAt: '2024-03-15', scheduledDate: '2024-03-25', acceptedAt: null, travelStartAt: null, reachedAt: null, completedAt: null, images: '', remarks: '', gpsTracking: false },
                { id: 'j2', leadId: null, customerName: 'ABC Corp', phone: '+91 98765 99999', address: '100 Business Park, Chicago', productCategory: 'Office Table', jobType: 'installation', paymentStatus: 'pending', status: 'created', assignedTo: null, createdAt: '2024-03-18', scheduledDate: '2024-03-22', acceptedAt: null, travelStartAt: null, reachedAt: null, completedAt: null, images: '', remarks: '', gpsTracking: false },
                { id: 'j3', leadId: null, customerName: 'XYZ Home', phone: '+91 98765 88888', address: '200 Residential Ave, Naperville', productCategory: 'Sofa', jobType: 'service', paymentStatus: 'paid', status: 'completed', assignedTo: 'u5', createdAt: '2024-03-10', scheduledDate: '2024-03-15', acceptedAt: '2024-03-15T09:00:00', travelStartAt: '2024-03-15T09:15:00', reachedAt: '2024-03-15T09:45:00', completedAt: '2024-03-15T11:30:00', images: 'site1.jpg,site2.jpg', remarks: 'Fixed successfully', gpsTracking: true },
            ],
            siteVisits: [
                { id: 'sv1', customerName: 'New Society Visit', phone: '+91 98765 77777', address: 'Green Valley Society', visitDate: '2024-03-19', visitType: 'Society Visit', payment: 0, photos: '', remarks: 'Met society secretary', createdBy: 'u6' },
            ],
            notifications: [
                { id: 'n1', userId: 'u2', type: 'info', title: 'Lead Converted', message: 'David Thompson converted to dispatch', read: false, createdAt: '2024-03-15T10:00:00', isFlash: false },
                { id: 'n2', userId: 'u3', type: 'alert', title: 'New Job Assigned', message: 'New delivery job for David Thompson', read: false, createdAt: '2024-03-15T10:05:00', isFlash: false },
                { id: 'n3', userId: 'u3', type: 'alert', title: 'Location Reached', message: 'Field agent reached location for XYZ Home', read: false, createdAt: '2024-03-15T09:45:00', isFlash: false },
                { id: 'n4', userId: 'all_sales', type: 'flash', title: 'Daily Reminder', message: 'Add Today\'s Leads!', read: false, createdAt: new Date().toISOString(), isFlash: true },
            ],
            activityLogs: [],
            currentUser: null
        };

        let currentPage = 'dashboard';
        let showModal = null;
        let editingItem = null;
        let dateFilter = new Date().toISOString().split('T')[0];
        let categoryFilter = '';
        let calendarDate = new Date();
        let showFlashAlert = true;
        let gpsInterval = null;

        function generateId() { return 'id-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9); }
        
        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const d = new Date(dateStr);
            return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
        }
        
        function formatDateTime(dateStr) {
            if (!dateStr) return '-';
            const d = new Date(dateStr);
            return d.toLocaleString('en-GB', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
        }
        
        function formatCurrency(amount) {
            return '₹' + parseInt(amount || 0).toLocaleString('en-IN');
        }
        
        function isOverdue(dateStr) {
            if (!dateStr) return false;
            const today = new Date(); today.setHours(0,0,0,0);
            const target = new Date(dateStr); target.setHours(0,0,0,0);
            return target < today;
        }
        
        function isToday(dateStr) {
            if (!dateStr) return false;
            return dateStr === new Date().toISOString().split('T')[0];
        }
        
        function checkDuplicatePhone(phone, excludeId = null) {
            return store.leads.some(l => l.phone === phone && l.id !== excludeId);
        }
        
        function logActivity(action, details) {
            store.activityLogs.push({
                id: generateId(),
                userId: store.currentUser?.id,
                userName: store.currentUser?.name,
                role: store.currentUser?.role,
                action,
                details,
                createdAt: new Date().toISOString()
            });
        }

        function createNotification(userId, type, title, message, isFlash = false) {
            store.notifications.push({
                id: generateId(),
                userId,
                type,
                title,
                message,
                read: false,
                createdAt: new Date().toISOString(),
                isFlash
            });
            render();
        }

        function getAllNotifications() {
            return store.notifications.filter(n => n.userId === store.currentUser?.id || n.userId === 'all_sales' && store.currentUser?.role === 'sales' || n.userId === 'all_service' && store.currentUser?.role === 'service_head' || n.userId === 'all_field' && store.currentUser?.role === 'field_agent' || n.userId === 'all_site' && store.currentUser?.role === 'site_agent' || n.userId === 'all');
        }

        function render() {
            const app = document.getElementById('app');
            if (!store.currentUser) {
                app.innerHTML = renderLogin();
                initFlatpickr();
                return;
            }
            
            const flashNotif = showFlashAlert ? store.notifications.find(n => n.isFlash && !n.read && (n.userId === 'all' || n.userId === 'all_' + store.currentUser.role || (store.currentUser.role === 'admin'))) : null;
            
            app.innerHTML = (flashNotif ? `<div class="flash-alert" onclick="dismissFlash()">
                <i class="fas fa-bell"></i> ${flashNotif.message}
            </div>` : '') + renderLayout(renderPage());
            initFlatpickr();
            
            if (flashNotif) {
                flashNotif.read = true;
                setTimeout(() => { showFlashAlert = false; render(); }, 10000);
            }
        }

        function dismissFlash() {
            showFlashAlert = false;
            render();
        }

        function renderLogin() {
            return `<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;background:linear-gradient(135deg,#0F0F1A,#1A1A2E);">

                    <div style="text-align:center;margin-bottom:2rem;">

                        <h1 style="font-size:1.5rem;font-weight:700;color:white;margin-bottom:0.25rem;">FurniFlow</h1>
                        <p style="color:#9CA3AF;font-size:0.875rem;">Business Management System v2</p>
                    </div>
                    <div class="card">
                        <h2 style="font-size:1.125rem;font-weight:600;color:white;margin-bottom:1rem;">Sign In</h2>
                        <div class="form-group">
                            <label class="form-label">Email</label>
                            <input type="email" id="loginEmail" class="input" placeholder="Enter your email">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Password</label>
                            <input type="password" id="loginPassword" class="input" placeholder="Enter your password">
                        </div>
                        <button onclick="handleLogin()" class="btn btn-primary" style="width:100%;">Sign In</button>
                        <div style="margin-top:1rem;padding-top:1rem;border-top:1px solid #3A3A5C;">
                            <p style="font-size:0.7rem;color:#6B7280;text-align:center;margin-bottom:0.5rem;">DEMO CREDENTIALS</p>
                            <div style="font-size:0.65rem;color:#9CA3AF;text-align:center;line-height:1.6;">
                                Sales: sarah@sales123 | Service: mike@service123<br>
                                Field: tom@agent123 | Site: raj@site123<br>
                                Admin: john@admin123
                            </div>
                        </div>
                    </div>
                </div>
            </div>`;
        }

        function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const user = store.users.find(u => u.email === email && u.password === password && u.active);
            if (user) {
                store.currentUser = user;
                logActivity('Login', 'User logged in');
                currentPage = 'dashboard';
                render();
            } else {
                alert('Invalid credentials or inactive account');
            }
        }

        function logout() {
            if (gpsInterval) clearInterval(gpsInterval);
            logActivity('Logout', 'User logged out');
            store.currentUser = null;
            currentPage = 'login';
            render();
        }

        function navigate(page) { currentPage = page; render(); }

        function renderPage() {
            const pages = { 
                dashboard: renderDashboard, 
                leads: renderLeads, 
                services: renderServices,
                claims: renderClaims,
                jobs: renderJobs,
                siteVisits: renderSiteVisits,
                calendar: renderCalendar, 
                admin: renderAdmin, 
                users: renderUserManagement 
            };
            return pages[currentPage]?.() || renderDashboard();
        }

        function renderLayout(content) {
            const user = store.currentUser;
            const unreadNotifications = getAllNotifications().filter(n => !n.read).length;
            
            return `<div class="sidebar">

                                <td><p style="color:white;font-weight:500;">${j.customerName}</p><p style="color:#9CA3AF;font-size:0.7rem;">${j.phone}</p><p style="color:#6B7280;font-size:0.7rem;">${j.address.substring(0,25)}...</p>

                                    ${(user.role === 'service_head' || user.role === 'admin') && j.assignedTo ? `<button onclick="assignJob('${j.id}')" class="btn btn-secondary" style="padding:0.25rem 0.5rem;font-size:0.7rem;"><i class="fas fa-user"></i></button>` : ''}
                                    ${user.role === 'field_agent' && j.status === 'assigned' ? `<button onclick="acceptJob('${j.id}')" class="btn btn-primary" style="padding:0.25rem 0.5rem;font-size:0.7rem;">Accept</button>` : ''}
                                    ${user.role === 'field_agent' && j.status === 'accepted' ? `<button onclick="startTravel('${j.id}')" class="btn btn-warning" style="padding:0.25rem 0.5rem;font-size:0.7rem;">Start Travel</button>` : ''}
                                    ${user.role === 'field_agent' && j.status === 'in_progress' ? `<button onclick="reachedLocation('${j.id}')" class="btn btn-success" style="padding:0.25rem 0.5rem;font-size:0.7rem;">Reached</button>` : ''}
                                    ${user.role === 'field_agent' && j.status === 'reached' ? `<button onclick="completeJob('${j.id}')" class="btn btn-success" style="padding:0.25rem 0.5rem;font-size:0.7rem;">Complete</button>` : ''}

                ${filteredJobs.filter(j => j.status !== 'completed').map(j => j.status !== 'created' && j.status !== 'assigned' ? renderJobTimeline(j) : '').join('')}

        function renderJobTimeline(job) {

                    ${job.travelStartAt ? `<div class="timeline-item"><p style="color:#9CA3AF;font-size:0.75rem;">Travel Started</p><p style="color:#FBBF24;font-size:0.875rem;">${formatDateTime(job.travelStartAt)}</p></div>` : ''}
                    ${job.reachedAt ? `<div class="timeline-item"><p style="color:#9CA3AF;font-size:0.75rem;">Reached Location</p><p style="color:#00D9A5;font-size:0.875rem;">${formatDateTime(job.reachedAt)}</p></div>` : ''}
                    ${job.completedAt ? `<div class="timeline-item"><p style="color:#9CA3AF;font-size:0.75rem;">Job Completed</p><p style="color:#86EFAC;font-size:0.875rem;">${formatDateTime(job.completedAt)}</p></div>` : ''}

                                <td><p style="color:white;font-weight:500;">${sv.customerName}</p><p style="color:#9CA3AF;font-size:0.7rem;">${sv.phone}</p><p style="color:#6B7280;font-size:0.7rem;">${sv.address.substring(0,30)}...</p></td>
                                <td><span class="badge badge-site">${sv.visitType}</span></td>

                        </tbody>
                    </table>
                </div>
            </div>`;
        }

        function renderCalendar() {
            const user = store.currentUser;
            const year = calendarDate.getFullYear();
            const month = calendarDate.getMonth();
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const today = new Date();
            const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
            
            const events = [];
            store.leads.forEach(l => { if (l.nextFollowUp) { const d = new Date(l.nextFollowUp); if (d.getMonth() === month && d.getFullYear() === year) events.push({ date: l.nextFollowUp, type: 'lead', title: l.customerName }); } });
            store.jobs.forEach(j => { if (j.scheduledDate) { const d = new Date(j.scheduledDate); if (d.getMonth() === month && d.getFullYear() === year) events.push({ date: j.scheduledDate, type: 'job', title: j.customerName }); } });
            store.services.forEach(s => { if (s.attendDate) { const d = new Date(s.attendDate); if (d.getMonth() === month && d.getFullYear() === year) events.push({ date: s.attendDate, type: 'service', title: s.customerName }); } });
            store.siteVisits.forEach(sv => { const d = new Date(sv.visitDate); if (d.getMonth() === month && d.getFullYear() === year) events.push({ date: sv.visitDate, type: 'site', title: sv.customerName }); });

            return `<div style="display:grid;gap:1.5rem;">
                <div><h1 style="font-size:1.5rem;font-weight:700;color:white;">Calendar</h1><p style="color:#9CA3AF;margin-top:0.25rem;">View schedule across all modules</p></div>
                
                <div class="card">
                    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;">
                        <button onclick="calendarDate.setMonth(calendarDate.getMonth()-1);render()" class="btn btn-secondary">&lt; Prev</button>
                        <h2 style="color:white;font-weight:600;">${monthNames[month]} ${year}</h2>
                        <button onclick="calendarDate.setMonth(calendarDate.getMonth()+1);render()" class="btn btn-secondary">Next &gt;</button>
                    </div>
                    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:0.25rem;margin-bottom:0.5rem;">${['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].map(d => `<div style="text-align:center;font-size:0.7rem;color:#9CA3AF;padding:0.5rem;font-weight:600;">${d}</div>`).join('')}</div>
                    <div class="calendar-grid">
                        ${Array(firstDay).fill(null).map(() => '<div></div>').join('')}
                        ${Array(daysInMonth).fill(null).map((_, i) => { 
                            const day = i + 1; 
                            const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`; 
                            const dayEvents = events.filter(e => e.date === dateStr);
                            const hasLead = dayEvents.some(e => e.type === 'lead');
                            const hasJob = dayEvents.some(e => e.type === 'job');
                            const hasService = dayEvents.some(e => e.type === 'service');
                            const hasSite = dayEvents.some(e => e.type === 'site');
                            const isToday = today.getDate() === day && today.getMonth() === month && today.getFullYear() === year; 
                            return `<div class="calendar-day ${isToday ? 'today' : ''}" onclick="selectDate('${dateStr}')" style="${hasLead || hasJob || hasService || hasSite ? 'background:rgba(233,69,96,0.15);' : ''}">
                                <span>${day}</span>
                                ${hasLead ? '<span class="event-dot" style="background:#FCD34D;"></span>' : ''}
                                ${hasJob ? '<span class="event-dot" style="background:#93C5FD;"></span>' : ''}
                                ${hasService ? '<span class="event-dot" style="background:#86EFAC;"></span>' : ''}
                                ${hasSite ? '<span class="event-dot" style="background:#5EEAD4;"></span>' : ''}
                            </div>`; 
                        }).join('')}
                    </div>
                    <div style="display:flex;gap:1rem;margin-top:1rem;flex-wrap:wrap;">
                        <span style="font-size:0.7rem;display:flex;align-items:center;gap:0.25rem;"><span style="width:0.5rem;height:0.5rem;background:#FCD34D;border-radius:50%;"></span> Follow-up</span>
                        <span style="font-size:0.7rem;display:flex;align-items:center;gap:0.25rem;"><span style="width:0.5rem;height:0.5rem;background:#93C5FD;border-radius:50%;"></span> Job</span>
                        <span style="font-size:0.7rem;display:flex;align-items:center;gap:0.25rem;"><span style="width:0.5rem;height:0.5rem;background:#86EFAC;border-radius:50;"></span> Service</span>
                        <span style="font-size:0.7rem;display:flex;align-items:center;gap:0.25rem;"><span style="width:0.5rem;height:0.5rem;background:#5EEAD4;border-radius:50%;"></span> Site Visit</span>
                    </div>
                </div>
                
                <div class="card"><h3 style="color:white;font-weight:600;margin-bottom:1rem;">Events on Selected Date</h3><div id="calendarEvents" style="display:grid;gap:0.5rem;"><p style="color:#9CA3AF;text-align:center;padding:1rem;">Click on a date to see events</p></div></div>
            </div>`;
        }

        function selectDate(dateStr) {
            const events = [];
            store.leads.forEach(l => { if (l.nextFollowUp === dateStr) events.push({ type: 'lead', title: l.customerName, detail: `Follow-up: ${l.productCategory}` }); });
            store.jobs.forEach(j => { if (j.scheduledDate === dateStr) events.push({ type: 'job', title: j.customerName, detail: `${j.jobType} - ${j.status}` }); });
            store.services.forEach(s => { if (s.attendDate === dateStr) events.push({ type: 'service', title: s.customerName, detail: `${s.serviceType} - ${s.status}` }); });
            store.siteVisits.forEach(sv => { if (sv.visitDate === dateStr) events.push({ type: 'site', title: sv.customerName, detail: sv.visitType }); });
            
            const eventsDiv = document.getElementById('calendarEvents');
            if (events.length > 0) { 
                eventsDiv.innerHTML = events.map(e => `<div style="display:flex;align-items:center;gap:0.75rem;padding:0.75rem;background:#0F0F1A;border-radius:0.5rem;">
                    <span class="badge badge-${e.type === 'lead' ? 'interested' : e.type === 'job' ? 'assigned' : e.type === 'service' ? 'completed' : 'site'}">${e.type}</span>
                    <div><p style="color:white;font-weight:500;">${e.title}</p><p style="color:#9CA3AF;font-size:0.75rem;">${e.detail}</p></div>
                </div>`).join(''); 
            }
            else { eventsDiv.innerHTML = '<p style="color:#9CA3AF;text-align:center;padding:1rem;">No events on this date</p>'; }
        }

                        ${overdueJobs > 0 ? `<span style="color:#EF4444;">${overdueJobs} Overdue Jobs</span>` : ''}

                    </div>

                    <div class="stat-card"><p style="color:#9CA3AF;font-size:0.75rem;">Total Leads</p><p style="font-size:1.5rem;font-weight:700;color:white;">${totalLeads}</p></div>
                    <div class="stat-card"><p style="color:#9CA3AF;font-size:0.75rem;">Converted</p><p style="font-size:1.5rem;font-weight:700;color:#86EFAC;">${convertedLeads}</p></div>
                    <div class="stat-card"><p style="color:#9CA3AF;font-size:0.75rem;">Site Leads</p><p style="font-size:1.5rem;font-weight:700;color:#5EEAD4;">${siteLeads}</p></div>
                </div></div>
                
                <div><h2 style="color:white;font-weight:600;margin-bottom:0.75rem;">Service Overview</h2>
                <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1rem;">
                    <div class="stat-card"><p style="color:#9CA3AF;font-size:0.75rem;">Total Services</p><p style="font-size:1.5rem;font-weight:700;color:white;">${totalServices}</p></div>
                    <div class="stat-card"><p style="color:#9CA3AF;font-size:0.75rem;">Revenue</p><p style="font-size:1.25rem;font-weight:700;color:#86EFAC;">${formatCurrency(serviceRevenue)}</p></div>
                </div></div>

                    <div class="stat-card"><p style="color:#9CA3AF;font-size:0.75rem;">In Progress</p><p style="font-size:1.5rem;font-weight:700;color:#FDE68A;">${jobsInProgress}</p></div>
                    <div class="stat-card"><p style="color:#9CA3AF;font-size:0.75rem;">Completed</p><p style="font-size:1.5rem;font-weight:700;color:#86EFAC;">${completedJobs}</p></div>

        // Lead functions
        function openLeadModal() { editingItem = null; showModal = 'lead'; render(); }
        function editLead(id) { editingItem = id; showModal = 'lead'; render(); }
        function deleteLead(id) { if (confirm('Delete this lead?')) { store.leads = store.leads.filter(l => l.id !== id); logActivity('Delete Lead', `Deleted lead ${id}`); render(); } }
        function convertLead(id) { editingItem = id; showModal = 'convert'; render(); }
        function toggleFollowUpField() { const status = document.getElementById('leadStatus')?.value; const group = document.getElementById('followUpGroup'); if (group) group.style.display = status === 'interested' ? 'block' : 'none'; }

        function saveLead() {
            const name = document.getElementById('leadName').value.trim();
            const phone = document.getElementById('leadPhone').value.trim();
            const address = document.getElementById('leadAddress').value.trim();
            const productCategory = document.getElementById('leadProduct').value;
            const leadValue = document.getElementById('leadValue').value;
            const status = document.getElementById('leadStatus').value;
            const nextFollowUp = document.getElementById('leadFollowUp').value || null;
            const remarks = document.getElementById('leadRemarks').value;
            
            if (!name || !phone || !address) { alert('Please fill required fields (Name, Phone, Address)'); return; }
            
            if (!editingItem && checkDuplicatePhone(phone)) { alert('A lead with this phone number already exists!'); return; }
            
            if (status === 'interested' && !nextFollowUp) { alert('Follow-up date is required for interested leads'); return; }
            
            const isNew = !editingItem;
            const data = { 
                customerName: name, 
                phone, 
                address, 
                productCategory, 
                leadValue: parseInt(leadValue) || 0,
                status, 
                nextFollowUp, 
                remarks, 
                leadDate: isNew ? new Date().toISOString().split('T')[0] : store.leads.find(l => l.id === editingItem).leadDate,
                createdBy: isNew ? store.currentUser.id : store.leads.find(l => l.id === editingItem).createdBy,
                isSiteLead: isNew ? store.currentUser.role === 'site_agent' : store.leads.find(l => l.id === editingItem).isSiteLead,
                locked: true
            };
            
            if (editingItem) { 
                const idx = store.leads.findIndex(l => l.id === editingItem);
                store.leads[idx] = { ...store.leads[idx], ...data }; 
                logActivity('Update Lead', `Updated lead for ${name}`);
            }
            else { 
                store.leads.push({ id: generateId(), ...data }); 
                logActivity('Create Lead', `Created lead for ${name}`);
            }
            closeModal();
        }

        function confirmConversion() {
            const payment = document.getElementById('convertPayment').value;
            const dispatchDate = document.getElementById('convertDate').value;
            if (!dispatchDate) { alert('Please select dispatch date'); return; }
            
            const lead = store.leads.find(l => l.id === editingItem);
            store.leads.find(l => l.id === editingItem).status = 'converted';
            store.leads.find(l => l.id === editingItem).paymentConfirmed = payment === 'yes';
            store.leads.find(l => l.id === editingItem).dispatchDate = dispatchDate;
            
            store.jobs.push({ 
                id: generateId(), 
                leadId: editingItem, 
                customerName: lead.customerName, 
                phone: lead.phone, 
                address: lead.address, 
                productCategory: lead.productCategory, 
                jobType: 'delivery', 
                partsRequired: '', 
                notes: '', 
                paymentStatus: payment === 'yes' ? 'paid' : 'pending', 
                status: 'created', 
                assignedTo: null, 
                createdAt: new Date().toISOString().split('T')[0], 
                scheduledDate: dispatchDate, 
                acceptedAt: null, 
                travelStartAt: null, 
                reachedAt: null,
                completedAt: null, 
                images: '', 
                remarks: '', 
                gpsTracking: false 
            });
            
            createNotification('all_service', 'alert', 'New Dispatch Job', `New delivery job for ${lead.customerName} on ${dispatchDate}`);
            logActivity('Convert Lead', `Converted ${lead.customerName} to dispatch`);
            closeModal();
        }

        function openServiceModal() { editingItem = null; showModal = 'service'; render(); }
        function editService(id) { editingItem = id; showModal = 'service'; render(); }
        function deleteService(id) { if (confirm('Delete this service?')) { store.services = store.services.filter(s => s.id !== id); logActivity('Delete Service', `Deleted service ${id}`); render(); } }
        function completeService(id) { 
            const service = store.services.find(s => s.id === id);
            service.status = 'completed';
            service.attendDate = new Date().toISOString().split('T')[0];
            logActivity('Complete Service', `Completed service for ${service.customerName}`);
            render();
        }

        function saveService() {
            const data = { 
                customerName: document.getElementById('serviceCustomer').value,
                phone: document.getElementById('servicePhone').value,
                address: document.getElementById('serviceAddress').value,
                serviceType: document.getElementById('serviceType').value,
                serviceValue: document.getElementById('serviceType').value === 'FOC' ? 0 : parseInt(document.getElementById('serviceValue').value) || 0,
                requestDate: document.getElementById('serviceRequestDate').value,
                attendDate: document.getElementById('serviceAttendDate').value || null,
                remarks: document.getElementById('serviceRemarks').value,
                status: 'pending',
                createdBy: store.currentUser.id
            };
            
            if (!data.customerName || !data.phone) { alert('Please fill required fields'); return; }
            if (data.serviceType === 'Paid' && !data.serviceValue) { alert('Please enter service value'); return; }
            
            if (editingItem) { 
                const idx = store.services.findIndex(s => s.id === editingItem);
                store.services[idx] = { ...store.services[idx], ...data };
                logActivity('Update Service', `Updated service for ${data.customerName}`);
            }
            else { 
                store.services.push({ id: generateId(), ...data });
                logActivity('Create Service', `Created service for ${data.customerName}`);
            }
            closeModal();
        }

        // Claims functions
        function openClaimModal() { editingItem = null; showModal = 'claim'; render(); }
        function saveClaim() {
            const data = {
                serviceId: document.getElementById('claimService').value,
                partNumber: document.getElementById('claimPart').value,
                reason: document.getElementById('claimReason').value,
                dueDate: document.getElementById('claimDueDate').value || null,
                status: 'pending',
                createdBy: store.currentUser.id
            };
            
            if (!data.partNumber || !data.reason) { alert('Please fill required fields'); return; }
            
            store.claims.push({ id: generateId(), ...data });
            logActivity('Create Claim', `Created claim for part ${data.partNumber}`);
            closeModal();
        }
        
        function resolveClaim(id) {
            const claim = store.claims.find(c => c.id === id);
            claim.status = 'resolved';
            logActivity('Resolve Claim', `Resolved claim for ${claim.partNumber}`);
            render();
        }
        
        function deleteClaim(id) { if (confirm('Delete this claim?')) { store.claims = store.claims.filter(c => c.id !== id); render(); } }

        // Job functions
        function openJobModal() { editingItem = null; showModal = 'job'; render(); }
        function assignJob(id) { editingItem = id; showModal = 'assign'; render(); }
        
        function saveJob() {
            const data = { 
                customerName: document.getElementById('jobCustomer').value,
                phone: document.getElementById('jobPhone').value,
                address: document.getElementById('jobAddress').value,
                jobType: document.getElementById('jobType').value,
                productCategory: document.getElementById('jobProduct').value,
                scheduledDate: document.getElementById('jobScheduled').value || null,
                paymentStatus: document.getElementById('jobPayment').value,
                notes: document.getElementById('jobNotes').value,
                partsRequired: '', 
                status: 'created', 
                assignedTo: null, 
                createdAt: editingItem ? store.jobs.find(j => j.id === editingItem).createdAt : new Date().toISOString().split('T')[0], 
                acceptedAt: null, 
                travelStartAt: null, 
                reachedAt: null,
                completedAt: null, 
                images: '', 
                remarks: '', 
                gpsTracking: false,
                leadId: null
            };
            
            if (!data.customerName || !data.phone || !data.address) { alert('Please fill required fields'); return; }
            
            if (editingItem) { 
                const idx = store.jobs.findIndex(j => j.id === editingItem);
                store.jobs[idx] = { ...store.jobs[idx], ...data };
                logActivity('Update Job', `Updated job for ${data.customerName}`);
            }
            else { 
                store.jobs.push({ id: generateId(), ...data });
                logActivity('Create Job', `Created job for ${data.customerName}`);
            }
            closeModal();
        }

        function confirmAssign() {
            const agentId = document.getElementById('assignAgent').value;
            const date = document.getElementById('assignDate').value;
            const job = store.jobs.find(j => j.id === editingItem);
            
            if (!agentId) { alert('Please select an agent'); return; }
            
            job.assignedTo = agentId;
            job.status = 'assigned';
            if (date) job.scheduledDate = date;
            
            createNotification(agentId, 'info', 'Job Assigned', `New job assigned: ${job.customerName}`);
            logActivity('Assign Job', `Assigned job to ${store.users.find(u => u.id === agentId).name}`);
            closeModal();
        }

        function acceptJob(id) {
            const job = store.jobs.find(j => j.id === id);
            job.status = 'accepted';
            job.acceptedAt = new Date().toISOString();
            job.gpsTracking = true;
            logActivity('Accept Job', `Accepted job for ${job.customerName}`);
            render();
        }

        function startTravel(id) {
            const job = store.jobs.find(j => j.id === id);
            job.status = 'in_progress';
            job.travelStartAt = new Date().toISOString();
            logActivity('Start Travel', `Started travel for ${job.customerName}`);
            render();
        }

        function reachedLocation(id) {
            const job = store.jobs.find(j => j.id === id);
            job.status = 'reached';
            job.reachedAt = new Date().toISOString();
            
            createNotification('all_service', 'alert', 'Location Reached', `Field agent reached location for ${job.customerName}`);
            logActivity('Reach Location', `Reached location for ${job.customerName}`);
            render();
        }

        function completeJob(id) { editingItem = id; showModal = 'completeJob'; render(); }

        function confirmCompleteJob() {
            const images = document.getElementById('completeImages').value;
            const remarks = document.getElementById('completeRemarks').value;
            
            if (!images || !remarks) { alert('Please upload images and add remarks'); return; }
            
            const job = store.jobs.find(j => j.id === editingItem);
            job.status = 'completed';
            job.completedAt = new Date().toISOString();
            job.images = images;
            job.remarks = remarks;
            job.gpsTracking = false;
            
            if (job.leadId) {
                createNotification(store.leads.find(l => l.id === job.leadId)?.createdBy, 'success', 'Job Completed', `Job for ${job.customerName} completed`);
            }
            logActivity('Complete Job', `Completed job for ${job.customerName}`);
            closeModal();
        }

        // Site Visit functions
        function openSiteVisitModal() { editingItem = null; showModal = 'siteVisit'; render(); }
        function editSiteVisit(id) { editingItem = id; showModal = 'siteVisit'; render(); }
        
        function saveSiteVisit() {
            const data = {
                customerName: document.getElementById('siteCustomer').value,
                phone: document.getElementById('sitePhone').value,
                address: document.getElementById('siteAddress').value,
                visitType: document.getElementById('siteType').value,
                payment: parseInt(document.getElementById('sitePayment').value) || 0,
                photos: document.getElementById('sitePhotos').value,
                remarks: document.getElementById('siteRemarks').value,
                visitDate: new Date().toISOString().split('T')[0],
                createdBy: store.currentUser.id
            };
            
            if (!data.customerName) { alert('Please enter customer name'); return; }
            
            if (editingItem) {
                const idx = store.siteVisits.findIndex(sv => sv.id === editingItem);
                store.siteVisits[idx] = { ...store.siteVisits[idx], ...data };
                logActivity('Update Visit', `Updated site visit for ${data.customerName}`);
            }
            else {
                store.siteVisits.push({ id: generateId(), ...data });
                logActivity('Create Visit', `Created site visit for ${data.customerName}`);
            }
            closeModal();
        }

        // User functions
        function openUserModal() { editingItem = null; showModal = 'user'; render(); }
        function editUser(id) { editingItem = id; showModal = 'user'; render(); }
        
        function saveUser() {
            const data = { 
                name: document.getElementById('userName').value,
                email: document.getElementById('userEmail').value,
                phone: document.getElementById('userPhone').value,
                role: document.getElementById('userRole').value,
                active: true
            };
            const password = document.getElementById('userPassword').value;
            
            if (!data.name || !data.email || !data.phone) { alert('Please fill required fields'); return; }
            if (!editingItem && !password) { alert('Password is required for new users'); return; }
            
            if (editingItem) { 
                const idx = store.users.findIndex(u => u.id === editingItem);
                store.users[idx] = { ...store.users[idx], ...data }; 
                if (password) store.users[idx].password = password;
                logActivity('Update User', `Updated user ${data.name}`);
            }
            else { 
                store.users.push({ id: generateId(), ...data, password: password || 'changeme' });
                logActivity('Create User', `Created user ${data.name}`);
            }
            closeModal();
        }

        function toggleUserStatus(id) { 
            const user = store.users.find(u => u.id === id); 
            user.active = !user.active; 
            logActivity('Toggle Status', `User ${user.name} ${user.active ? 'activated' : 'deactivated'}`); 
            render(); 
        }
        
        function deleteUser(id) { 
            if (confirm('Delete this user?')) { 
                const user = store.users.find(u => u.id === id); 
                store.users = store.users.filter(u => u.id !== id); 
                logActivity('Delete User', `Deleted user ${user.name}`); 
                render(); 
            } 
        }

        function closeModal() { showModal = null; editingItem = null; render(); }
        
        function showNotifications() { 
            const notifs = getAllNotifications();
            notifs.forEach(n => n.read = true);
            if (notifs.length > 0) {
                alert(notifs.map(n => `${n.title}: ${n.message}`).join('\n\n'));
            } else {
                alert('No notifications');
            }
            render();
        }
        
        function initFlatpickr() { 
            setTimeout(() => { 
                document.querySelectorAll('input[type="date"]').forEach(el => { 
                    if (!el._flatpickr) { 
                        el.flatpickr({ dateFormat: 'Y-m-d' }); 
                    } 
                }); 
            }, 100); 
        }

        render();
    </script>
</body>
</html>
