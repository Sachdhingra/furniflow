        .nav-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.625rem 0.75rem; border-radius: 0.5rem; color: #9CA3AF; text-decoration: none; transition: all 0.2s; }

        .modal-header { padding: 1rem 1.5rem; border-bottom: 1px solid #3A3A5C; display: flex; align-items: center; justify-content: space-between; }
        .modal-body { padding: 1.5rem; }
        .modal-footer { padding: 1rem 1.5rem; border-top: 1px solid #3A3A5C; display: flex; gap: 0.75rem; justify-content: flex-end; }
        .form-group { margin-bottom: 1rem; }
        .form-label { display: block; font-size: 0.875rem; font-weight: 500; color: #9CA3AF; margin-bottom: 0.5rem; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .avatar { width: 2rem; height: 2rem; border-radius: 50%; background: linear-gradient(135deg, #4DA8DA, #00D9A5); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.75rem; }
        .logo { width: 2.5rem; height: 2.5rem; border-radius: 0.5rem; background: linear-gradient(135deg, #E94560, #FF6B6B); display: flex; align-items: center; justify-content: center; }
        .stat-card { background: #1E1E32; border: 1px solid #3A3A5C; border-radius: 0.75rem; padding: 1rem; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 0.25rem; }
        .calendar-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 0.5rem; font-size: 0.75rem; cursor: pointer; padding: 0.25rem; }
        .calendar-day:hover { background: #2A2A44; }
        .calendar-day.today { background: #E94560; color: white; }
        .notification-dot { position: absolute; top: -0.25rem; right: -0.25rem; min-width: 1.25rem; height: 1.25rem; background: #E94560; border-radius: 50%; font-size: 0.625rem; display: flex; align-items: center; justify-content: center; padding: 0 0.25rem; }
        .flash-alert { position: fixed; top: 1rem; right: 1rem; background: linear-gradient(135deg, #F59E0B, #FBBF24); color: #000; padding: 1rem 1.5rem; border-radius: 0.75rem; z-index: 100; animation: slideIn 0.3s ease; box-shadow: 0 4px 20px rgba(245, 158, 11, 0.4); cursor: pointer; }

        .timeline::before { content: ''; position: absolute; left: 0.5rem; top: 0; bottom: 0; width: 2px; background: #3A3A5C; }
        .timeline-item { position: relative; padding-bottom: 1rem; }
        .timeline-item::before { content: ''; position: absolute; left: -1.25rem; top: 0.25rem; width: 0.75rem; height: 0.75rem; border-radius: 50%; background: #E94560; border: 2px solid #1E1E32; }

        .locked-field::after { content: '\f023'; font-family: 'Font Awesome 6 Free'; font-weight: 900; position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%); color: #E94560; font-size: 0.75rem; }
        .required-indicator { color: #E94560; }
        .warning-box { background: rgba(245, 158, 11, 0.1); border: 1px solid #F59E0B; border-radius: 0.5rem; padding: 0.75rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; color: #F59E0B; font-size: 0.875rem; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .perf-bar { height: 8px; background: #3A3A5C; border-radius: 4px; overflow: hidden; }
        .perf-bar-fill { height: 100%; background: linear-gradient(90deg, #E94560, #00D9A5); border-radius: 4px; }
        .trip-card { background: #1E1E32; border: 1px solid #3A3A5C; border-radius: 0.75rem; padding: 1rem; margin-bottom: 0.75rem; }
        .trip-card.active { border-color: #00D9A5; }
        .offline-indicator { position: fixed; bottom: 1rem; left: 50%; transform: translateX(-50%); background: #F59E0B; color: #000; padding: 0.5rem 1rem; border-radius: 0.5rem; font-size: 0.75rem; display: none; }
        .offline-indicator.show { display: block; }
        @media (max-width: 768px) { .sidebar { width: 4rem; } .main-content { margin-left: 4rem; } .sidebar-text { display: none; } .modal { max-width: 100%; margin: 0.5rem; } .form-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div id="app"></div>
    <div id="offlineIndicator" class="offline-indicator"><i class="fas fa-wifi"></i> Working Offline - Data will sync when online</div>

    <script>
        const PRODUCT_CATEGORIES = ['Sofa', 'Coffee Table', 'Almirah', 'Dining', 'Mattress', 'Bed', 'Kitchen', 'Chair', 'Office Table', 'Others'];
        const SERVICE_TYPES = ['Paid', 'FOC'];
        const VISIT_TYPES = ['New House', 'Society Visit', 'Commercial', 'Follow-up'];
        
        // FurniFlow API Configuration - uses relative API for Vercel
        const API_BASE = '/api';
        let authToken = localStorage.getItem('furniflow_token');

        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW registration failed:', err));
        }

        // API Helper
        async function api(endpoint, method = 'GET', body = null) {
            const headers = { 'Content-Type': 'application/json' };
            if (authToken) headers['Authorization'] = `Bearer ${authToken}`;
            const options = { method, headers };
            if (body) options.body = JSON.stringify(body);
            const response = await fetch(API_BASE + endpoint, options);
            if (!response.ok) throw new Error((await response.json()).error || 'Request failed');
            return response.json();
        }

        // Initialize store from API
        async function loadFromAPI() {
            try {
                const token = localStorage.getItem('furniflow_token');
                const userStr = localStorage.getItem('furniflow_user');
                if (token && userStr) {
                    authToken = token;
                    store.currentUser = JSON.parse(userStr);
                    const [leads, services, jobs, claims, siteVisits, dashboard] = await Promise.all([
                        api('/leads').catch(() => []),
                        api('/services').catch(() => []),
                        api('/jobs').catch(() => []),
                        api('/claims').catch(() => []),
                        api('/sitevisits').catch(() => []),
                        api('/dashboard').catch(() => ({}))
                    ]);
                    store.leads = leads;
                    store.services = services;
                    store.jobs = jobs;
                    store.claims = claims;
                    store.siteVisits = siteVisits;
                    store.dashboard = dashboard;
                }
            } catch (e) { console.log('Using local data'); }
        }

        const store = {
            users: [
                { id: 'u1', name: 'John Admin', role: 'admin', email: 'john@furniflow.com', phone: '+91 98765 43210', active: true, password: 'admin123', remarks: '' },
                { id: 'u2', name: 'Sarah Sales', role: 'sales', email: 'sarah@furniflow.com', phone: '+91 98765 43211', active: true, password: 'sales123', remarks: '' },
                { id: 'u3', name: 'Mike Service', role: 'service_head', email: 'mike@furniflow.com', phone: '+91 98765 43212', active: true, password: 'service123', remarks: '' },
                { id: 'u4', name: 'Tom Agent', role: 'field_agent', email: 'tom@furniflow.com', phone: '+91 98765 43213', active: true, password: 'agent123', remarks: '' },
                { id: 'u5', name: 'Emily Agent', role: 'field_agent', email: 'emily@furniflow.com', phone: '+91 98765 43214', active: true, password: 'agent123', remarks: '' },
                { id: 'u6', name: 'Raj Site', role: 'site_agent', email: 'raj@furniflow.com', phone: '+91 98765 43215', active: true, password: 'site123', remarks: '' },
            ],
            leads: [
                { id: 'l1', customerName: 'Robert Anderson', phone: '+91 98765 11111', address: '123 Oak Street, Springfield', productCategory: 'Sofa', leadValue: 45000, leadDate: new Date().toISOString().split('T')[0], nextFollowUp: '2024-03-20', remarks: 'Interested in leather sofa', status: 'interested', createdBy: 'u2', isSiteLead: false, locked: true },
                { id: 'l2', customerName: 'Jennifer Martinez', phone: '+91 98765 22222', address: '456 Maple Ave, Chicago', productCategory: 'Dining', leadValue: 35000, leadDate: new Date().toISOString().split('T')[0], nextFollowUp: new Date().toISOString().split('T')[0], remarks: 'Looking for 6-seater', status: 'lead', createdBy: 'u2', isSiteLead: false, locked: true },
                { id: 'l3', customerName: 'David Thompson', phone: '+91 98765 33333', address: '789 Pine Road, Naperville', productCategory: 'Bed', leadValue: 55000, leadDate: '2024-03-10', nextFollowUp: null, remarks: 'Converted - Payment received', status: 'converted', paymentConfirmed: true, dispatchDate: '2024-03-25', createdBy: 'u2', isSiteLead: false, locked: true },
            ],
            services: [
                { id: 's1', customerName: 'ABC Corp', phone: '+91 98765 99999', address: '100 Business Park, Chicago', serviceType: 'Paid', serviceValue: 2500, requestDate: new Date().toISOString().split('T')[0], attendDate: null, status: 'pending', remarks: 'Office furniture repair', createdBy: 'u3' },
                { id: 's2', customerName: 'XYZ Home', phone: '+91 98765 88888', address: '200 Residential Ave', serviceType: 'FOC', serviceValue: 0, requestDate: '2024-03-10', attendDate: '2024-03-15', status: 'completed', remarks: 'Warranty repair', createdBy: 'u3' },
            ],
            claims: [
                { id: 'c1', serviceId: 's1', customerName: 'ABC Corp', phone: '+91 98765 99999', bookingDate: '2024-03-10', partNumber: 'LEG-001', reason: 'Broken table leg', dueDate: '2024-03-25', status: 'pending', createdBy: 'u3' },
            ],
            jobs: [
                { id: 'j1', leadId: 'l3', customerName: 'David Thompson', phone: '+91 98765 33333', address: '789 Pine Road, Naperville', productCategory: 'Bed', jobType: 'delivery', paymentStatus: 'paid', status: 'assigned', assignedTo: 'u4', createdAt: new Date().toISOString().split('T')[0], scheduledDate: new Date().toISOString().split('T')[0], acceptedAt: null, travelStartAt: null, reachedAt: null, completedAt: null, images: '', remarks: '', incompleteReason: '', gpsTracking: false },
                { id: 'j2', leadId: null, customerName: 'ABC Corp', phone: '+91 98765 99999', address: '100 Business Park, Chicago', productCategory: 'Office Table', jobType: 'installation', paymentStatus: 'pending', status: 'created', assignedTo: null, createdAt: new Date().toISOString().split('T')[0], scheduledDate: null, acceptedAt: null, travelStartAt: null, reachedAt: null, completedAt: null, images: '', remarks: '', incompleteReason: '', gpsTracking: false },
            ],
            trips: [
                { id: 't1', userId: 'u6', date: new Date().toISOString().split('T')[0], startTime: '09:00', endTime: null, totalDistance: 0, status: 'active', visits: ['sv1'] }
            ],
            siteVisits: [
                { id: 'sv1', tripId: 't1', customerName: 'Green Valley Society', phone: '+91 98765 77777', address: 'Green Valley Society, Block A', visitDate: new Date().toISOString().split('T')[0], visitTime: '10:30', visitType: 'Society Visit', payment: 0, photos: '', remarks: 'Met society secretary', gpsLat: '', gpsLng: '', createdBy: 'u6', locked: false },
            ],
            notifications: [
                { id: 'n1', userId: 'u3', type: 'alert', title: 'Location Reached', message: 'Field agent reached location for David Thompson', read: false, createdAt: new Date().toISOString() },
                { id: 'n2', userId: 'all_sales', type: 'flash', title: 'Daily Reminder', message: "Add Today's Leads!", read: false, createdAt: new Date().toISOString(), isFlash: true },
            ],
            activityLogs: [],
            currentUser: null
        };

        let currentPage = 'dashboard';
        let showModal = null;
        let editingItem = null;
        let secondaryItem = null;
        let dateFilter = new Date().toISOString().split('T')[0];
        let categoryFilter = '';
        let jobFilter = 'all';
        let serviceTab = 'services';
        let calendarDate = new Date();
        let showFlashAlert = true;
        let duplicateWarning = null;
        let offlineData = [];

        function generateId() { return 'id-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9); }
        
        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const d = new Date(dateStr);
            return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
        }
        
        function formatDateTime(dateStr) {
            if (!dateStr) return '-';
            const d = new Date(dateStr);
            return d.toLocaleString('en-GB', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
        }
        
        function formatCurrency(amount) { return '₹' + parseInt(amount || 0).toLocaleString('en-IN'); }
        
        function isOverdue(dateStr) {
            if (!dateStr) return false;
            const today = new Date(); today.setHours(0,0,0,0);
            const target = new Date(dateStr); target.setHours(0,0,0,0);
            return target < today;
        }

        function isOverdue15Days(dateStr) {
            if (!dateStr) return false;
            const today = new Date();
            const target = new Date(dateStr);
            const diffTime = today - target;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            return diffDays > 15;
        }
        
        function checkDuplicatePhone(phone, excludeId = null) {
            return store.leads.find(l => l.phone === phone && l.id !== excludeId);
        }

        function getServiceById(id) { return store.services.find(s => s.id === id); }
        
        function logActivity(action, details) {
            store.activityLogs.push({
                id: generateId(),
                userId: store.currentUser?.id,
                userName: store.currentUser?.name,
                role: store.currentUser?.role,
                action,
                details,
                createdAt: new Date().toISOString()
            });
        }

        function createNotification(userId, type, title, message, isFlash = false) {
            store.notifications.push({
                id: generateId(), userId, type, title, message, read: false, createdAt: new Date().toISOString(), isFlash
            });
            render();
        }

        function getAllNotifications() {
            const user = store.currentUser;
            if (!user) return [];
            return store.notifications.filter(n => 
                n.userId === user.id || 
                n.userId === 'all_' + user.role || 
                n.userId === 'all'
            );
        }

        function syncOfflineData() {
            if (offlineData.length > 0) {
                offlineData.forEach(data => {
                    if (data.type === 'siteVisit') store.siteVisits.push(data.data);
                    if (data.type === 'lead') store.leads.push(data.data);
                });
                offlineData = [];
                localStorage.setItem('furniflow_offline', JSON.stringify(offlineData));
            }
        }

        function saveOffline(type, data) {
            offlineData.push({ type, data, timestamp: new Date().toISOString() });
            localStorage.setItem('furniflow_offline', JSON.stringify(offlineData));
        }

        function loadOfflineData() {
            const saved = localStorage.getItem('furniflow_offline');
            if (saved) offlineData = JSON.parse(saved);
        }

        async function render() {
            loadOfflineData();
            const app = document.getElementById('app');
            
            // Check for existing session and load from API
            if (!store.currentUser) {
                const token = localStorage.getItem('furniflow_token');
                const userStr = localStorage.getItem('furniflow_user');
                if (token && userStr) {
                    authToken = token;
                    store.currentUser = JSON.parse(userStr);
                    await loadFromAPI();
                }
            }
            
            if (!store.currentUser) { app.innerHTML = renderLogin(); initFlatpickr(); return; }
            
            const flashNotif = showFlashAlert ? store.notifications.find(n => n.isFlash && !n.read && (n.userId === 'all' || n.userId === 'all_' + store.currentUser.role)) : null;
            app.innerHTML = (flashNotif ? `<div class="flash-alert" onclick="dismissFlash()"><i class="fas fa-bell"></i> ${flashNotif.message}</div>` : '') + renderLayout(renderPage());
            initFlatpickr();
            if (flashNotif) { flashNotif.read = true; setTimeout(() => { showFlashAlert = false; render(); }, 10000); }
        }

        function dismissFlash() { showFlashAlert = false; render(); }

        function renderLogin() {
            return `<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;background:linear-gradient(135deg,#0F0F1A,#1A1A2E);">

        // Clear all data function
        async function clearAllData() {
            if (!confirm('Are you sure you want to delete ALL data? This cannot be undone!')) return;
            try {
                await api('/clear-all', 'POST');
                store.leads = [];
                store.services = [];
                store.jobs = [];
                store.claims = [];
                store.siteVisits = [];
                store.dashboard = {};
                alert('All data cleared!');
                render();
            } catch (e) {
                alert('Failed to clear data: ' + e.message);
            }
        }

        async function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            try {
                const { token, user } = await api('/login', 'POST', { email, password });
                authToken = token;
                localStorage.setItem('furniflow_token', token);
                localStorage.setItem('furniflow_user', JSON.stringify(user));
                store.currentUser = user;
                await loadFromAPI();
                logActivity('Login', 'User logged in');
                currentPage = 'dashboard';
                render();
            } catch (e) {
                // Fallback to local login
                const user = store.users.find(u => u.email === email && u.password === password && u.active);
                if (user) { store.currentUser = user; syncOfflineData(); logActivity('Login', 'User logged in'); currentPage = 'dashboard'; render(); }
                else { alert('Invalid credentials or inactive account'); }
            }
        }

        function logout() {
            authToken = null;
            localStorage.removeItem('furniflow_token');
            localStorage.removeItem('furniflow_user');
            logActivity('Logout', 'User logged out');
            store.currentUser = null;
            currentPage = 'login';

        function renderCalendar() {

            store.leads.forEach(l => { if (l.nextFollowUp) { const d = new Date(l.nextFollowUp); if (d.getMonth() === month && d.getFullYear() === year) events.push({ date: l.nextFollowUp, type: 'lead', title: l.customerName }); } });

        function exportData(type) {
            let csv = '';
            if (type === 'sales') {
                csv = 'ID,Customer,Phone,Product,Value,Date,Status\n';
                store.leads.forEach(l => csv += `${l.id},${l.customerName},${l.phone},${l.productCategory},${l.leadValue},${l.leadDate},${l.status}\n`);
            } else if (type === 'service') {
                csv = 'ID,Customer,Phone,Type,Value,Request Date,Status\n';
                store.services.forEach(s => csv += `${s.id},${s.customerName},${s.phone},${s.serviceType},${s.serviceValue},${s.requestDate},${s.status}\n`);
            }
            const blob = new Blob([csv], { type: 'text/csv' });

        async function saveLead() {
            const name = document.getElementById('leadName').value.trim();
            const phone = document.getElementById('leadPhone').value.trim();
            const address = document.getElementById('leadAddress').value.trim();
            if (!name || !phone || !address) { alert('Fill required fields'); return; }
            const status = document.getElementById('leadStatus').value;
            const nextFollowUp = document.getElementById('leadFollowUp').value || null;
            if (status === 'interested' && !nextFollowUp) { alert('Follow-up date required'); return; }
            
            const data = { customerName: name, phone, address, productCategory: document.getElementById('leadProduct').value, leadValue: parseInt(document.getElementById('leadValue').value) || 0, status, nextFollowUp, remarks: document.getElementById('leadRemarks').value };
            
            try {
                if (editingItem) {
                    await api(`/leads/${editingItem}`, 'PUT', data);
                    logActivity('Update Lead', name);
                } else {
                    await api('/leads', 'POST', data);
                    logActivity('Create Lead', name);
                }
                await loadFromAPI();
            } catch (e) {
                // Fallback to local
                const isNew = !editingItem;
                if (editingItem) { store.leads[store.leads.findIndex(l => l.id === editingItem)] = { ...store.leads.find(l => l.id === editingItem), ...data }; logActivity('Update Lead', name); }
                else { store.leads.push({ id: generateId(), ...data }); logActivity('Create Lead', name); }
            }
            duplicateWarning = null;
            closeModal();
        }

        async function confirmConversion() {
            const payment = document.getElementById('convertPayment').value;
            const dispatchDate = document.getElementById('convertDate').value;

            const lead = store.leads.find(l => l.id === editingItem);
            
            try {
                await api(`/leads/${editingItem}`, 'PUT', { ...lead, status: 'converted', paymentConfirmed: payment === 'yes', dispatchDate });
                await api('/jobs', 'POST', { leadId: editingItem, customerName: lead.customerName, phone: lead.phone, address: lead.address, productCategory: lead.productCategory, jobType: 'delivery', paymentStatus: payment === 'yes' ? 'paid' : 'pending', scheduledDate: dispatchDate });
                createNotification('all_service', 'alert', 'New Job', `Job for ${lead.customerName}`);
                logActivity('Convert Lead', lead.customerName);
                await loadFromAPI();
            } catch (e) {
                // Fallback to local
                store.leads.find(l => l.id === editingItem).status = 'converted';
                store.leads.find(l => l.id === editingItem).paymentConfirmed = payment === 'yes';

                createNotification('all_service', 'alert', 'New Job', `Job for ${lead.customerName}`);

            closeModal();

        function assignJob(id) { editingItem = id; showModal = 'assign'; render(); }
        function saveJob() {
            store.jobs.push({ id: generateId(), customerName: document.getElementById('jobCustomer').value, phone: document.getElementById('jobPhone').value, address: document.getElementById('jobAddress').value, jobType: document.getElementById('jobType').value, productCategory: document.getElementById('jobProduct').value, scheduledDate: document.getElementById('jobScheduled').value || null, paymentStatus: document.getElementById('jobPayment').value, status: 'created', assignedTo: null, createdAt: new Date().toISOString().split('T')[0], acceptedAt: null, travelStartAt: null, reachedAt: null, completedAt: null, images: '', remarks: '', incompleteReason: '', gpsTracking: false });
            logActivity('Create Job', document.getElementById('jobCustomer').value);
            closeModal();
        }
        async function confirmAssign() {
            const job = store.jobs.find(j => j.id === editingItem);
            const data = {
                assignedTo: document.getElementById('assignAgent').value,
                status: 'assigned',
                scheduledDate: document.getElementById('assignDate').value || job?.scheduledDate
            };
            try {
                await api(`/jobs/${editingItem}`, 'PUT', data);
                createNotification(data.assignedTo, 'info', 'Job Assigned', job?.customerName);
                logActivity('Assign Job', job?.customerName);
                await loadFromAPI();
            } catch (e) {
                job.assignedTo = data.assignedTo;
                job.status = 'assigned';
                if (data.scheduledDate) job.scheduledDate = data.scheduledDate;
                createNotification(data.assignedTo, 'info', 'Job Assigned', job?.customerName);
                logActivity('Assign Job', job?.customerName);
                render();
            }
            closeModal();
        }

        
        async function acceptJob(id) {
            const job = store.jobs.find(j => j.id === id);
            try {
                await api(`/jobs/${id}`, 'PUT', { status: 'accepted', acceptedAt: new Date().toISOString(), travelStartAt: new Date().toISOString(), gpsTracking: true });
                logActivity('Accept & Start', job?.customerName);
                await loadFromAPI();
            } catch (e) {
                job.status = 'accepted';
                job.acceptedAt = new Date().toISOString();
                job.travelStartAt = new Date().toISOString();
                job.gpsTracking = true;
                logActivity('Accept & Start', job?.customerName);
                render();
            }
        }
        
        async function startTravel(id) {
            const job = store.jobs.find(j => j.id === id);
            try {
                await api(`/jobs/${id}`, 'PUT', { status: 'in_progress', travelStartAt: new Date().toISOString() });
                logActivity('Start Travel', job?.customerName);
                await loadFromAPI();
            } catch (e) {
                job.status = 'in_progress';
                job.travelStartAt = new Date().toISOString();
                logActivity('Start Travel', job?.customerName);
                render();
            }
        }
        
        async function reachedLocation(id) {
            const job = store.jobs.find(j => j.id === id);
            try {
                await api(`/jobs/${id}`, 'PUT', { status: 'reached', reachedAt: new Date().toISOString() });
                createNotification('all_service', 'alert', 'Location Reached', `${job?.customerName} location reached by field agent`);
                logActivity('Reached Location', job?.customerName);
                await loadFromAPI();
            } catch (e) {
                job.status = 'reached';
                job.reachedAt = new Date().toISOString();
                createNotification('all_service', 'alert', 'Location Reached', `${job?.customerName} location reached`);
                logActivity('Reached Location', job?.customerName);
                render();
            }
        }
        
        function completeJob(id) { editingItem = id; showModal = 'completeJob'; render(); }
        
        function confirmCompleteJob() {
            const status = document.getElementById('completionStatus').value;
            const images = document.getElementById('completeImages').value;
            const remarks = document.getElementById('completeRemarks').value;
            const incompleteReason = document.getElementById('incompleteReason').value;
            
            if (!images) { alert('Image upload is mandatory for job completion'); return; }
            if (status === 'incomplete' && !incompleteReason) { alert('Please provide reason for incomplete'); return; }
            
            const job = store.jobs.find(j => j.id === editingItem);
            job.status = status;
            job.completedAt = new Date().toISOString();
            job.images = images;
            job.remarks = remarks;
            job.incompleteReason = incompleteReason || '';
            job.gpsTracking = false;
            
            logActivity(status === 'completed' ? 'Complete Job' : 'Incomplete Job', job.customerName);
            closeModal();
        }

        // SITE VISITS
        function startTrip() {
            store.trips.push({ id: generateId(), userId: store.currentUser.id, date: new Date().toISOString().split('T')[0], startTime: new Date().toTimeString().slice(0,5), endTime: null, totalDistance: 0, status: 'active', visits: [] });
            logActivity('Start Trip', 'New trip started');
            render();
        }
        
        function endTrip() {
            const trip = store.trips.find(t => t.userId === store.currentUser.id && t.status === 'active');
            if (trip) { trip.status = 'completed'; trip.endTime = new Date().toTimeString().slice(0,5); }
            logActivity('End Trip', 'Trip ended');
            render();
        }
        
        function openSiteVisitModal() { editingItem = null; showModal = 'siteVisit'; render(); }
        function editSiteVisit(id) { editingItem = id; showModal = 'siteVisit'; render(); }
        
        function saveSiteVisit() {
            const trip = store.trips.find(t => t.userId === store.currentUser.id && t.status === 'active');
            const data = { tripId: trip?.id, customerName: document.getElementById('siteCustomer').value, phone: document.getElementById('sitePhone').value, address: document.getElementById('siteAddress').value, visitDate: new Date().toISOString().split('T')[0], visitTime: document.getElementById('siteTime').value, visitType: document.getElementById('siteType').value, payment: parseInt(document.getElementById('sitePayment').value) || 0, photos: document.getElementById('sitePhotos').value, remarks: document.getElementById('siteRemarks').value, gpsLat: document.getElementById('siteGpsLat').value, gpsLng: document.getElementById('siteGpsLng').value, createdBy: store.currentUser.id, locked: false };
            if (!data.customerName) { alert('Customer name required'); return; }
            if (!data.photos) { alert('Photos are mandatory'); return; }
            
            if (editingItem) { store.siteVisits[store.siteVisits.findIndex(sv => sv.id === editingItem)] = { ...store.siteVisits.find(sv => sv.id === editingItem), ...data }; }
            else { store.siteVisits.push({ id: generateId(), ...data }); if (trip) trip.visits.push(store.siteVisits[store.siteVisits.length-1].id); }
            logActivity('Site Visit', data.customerName);
            closeModal();
        }
        
        function convertToLead(id) {
            const sv = store.siteVisits.find(x => x.id === id);
            const lead = { id: generateId(), customerName: sv.customerName, phone: sv.phone, address: sv.address, productCategory: 'Others', leadValue: 0, leadDate: new Date().toISOString().split('T')[0], nextFollowUp: null, remarks: `Converted from site visit: ${sv.remarks}`, status: 'lead', createdBy: store.currentUser.id, isSiteLead: true, locked: true };
            store.leads.push(lead);
            sv.locked = true;
            logActivity('Convert to Lead', sv.customerName);
            alert('Site visit converted to lead!');
            render();
        }

        // USERS
        function openUserModal() { editingItem = null; showModal = 'user'; render(); }
        function editUser(id) { editingItem = id; showModal = 'user'; render(); }
        function saveUser() {
            const data = { name: document.getElementById('userName').value, email: document.getElementById('userEmail').value, phone: document.getElementById('userPhone').value, role: document.getElementById('userRole').value, active: true };
            const password = document.getElementById('userPassword').value;
            if (!data.name || !data.email || !data.phone) { alert('Fill required'); return; }
            if (!editingItem && !password) { alert('Password required'); return; }
            if (editingItem) { store.users[store.users.findIndex(u => u.id === editingItem)] = { ...store.users.find(u => u.id === editingItem), ...data, password: password || store.users.find(u => u.id === editingItem).password }; }
            else { store.users.push({ id: generateId(), ...data, password: password || 'changeme' }); }
            closeModal();
        }
        function toggleUserStatus(id) { const user = store.users.find(u => u.id === id); user.active = !user.active; render(); }
        function deleteUser(id) { if (confirm('Delete user?')) { store.users = store.users.filter(u => u.id !== id); render(); } }

        function closeModal() { showModal = null; editingItem = null; secondaryItem = null; render(); }
        function showNotifications() { const notifs = getAllNotifications(); notifs.forEach(n => n.read = true); alert(notifs.length > 0 ? notifs.map(n => `${n.title}: ${n.message}`).join('\n\n') : 'No notifications'); render(); }
        function initFlatpickr() { setTimeout(() => { document.querySelectorAll('input[type="date"]').forEach(el => { if (!el._flatpickr) { el.flatpickr({ dateFormat: 'Y-m-d' }); } }); }, 100); }

        render();
    </script>
</body>
</html>
