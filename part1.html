        .warning-box { background: rgba(245, 158, 11, 0.1); border: 1px solid #F59E0B; border-radius: 0.5rem; padding: 0.75rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; color: #F59E0B; font-size: 0.875rem; }

        .perf-bar { height: 8px; background: #3A3A5C; border-radius: 4px; overflow: hidden; }
        .perf-bar-fill { height: 100%; background: linear-gradient(90deg, #E94560, #00D9A5); border-radius: 4px; }
        .trip-card { background: #1E1E32; border: 1px solid #3A3A5C; border-radius: 0.75rem; padding: 1rem; margin-bottom: 0.75rem; }
        .trip-card.active { border-color: #00D9A5; }
        .offline-indicator { position: fixed; bottom: 1rem; left: 50%; transform: translateX(-50%); background: #F59E0B; color: #000; padding: 0.5rem 1rem; border-radius: 0.5rem; font-size: 0.75rem; display: none; }
        .offline-indicator.show { display: block; }
        @media (max-width: 768px) { .sidebar { width: 4rem; } .main-content { margin-left: 4rem; } .sidebar-text { display: none; } .modal { max-width: 100%; margin: 0.5rem; } .form-row { grid-template-columns: 1fr; } }
    </style>

        function generateId() { return 'id-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9); }
        
        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const d = new Date(dateStr);
            return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
        }
        
        function formatDateTime(dateStr) {
            if (!dateStr) return '-';
            const d = new Date(dateStr);
            return d.toLocaleString('en-GB', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
        }
        
        function formatCurrency(amount) { return '₹' + parseInt(amount || 0).toLocaleString('en-IN'); }
        
        function isOverdue(dateStr) {
            if (!dateStr) return false;
            const today = new Date(); today.setHours(0,0,0,0);
            const target = new Date(dateStr); target.setHours(0,0,0,0);
            return target < today;
        }

        function isOverdue15Days(dateStr) {
            if (!dateStr) return false;
            const today = new Date();
            const target = new Date(dateStr);
            const diffTime = today - target;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            return diffDays > 15;
        }

            return store.notifications.filter(n =>

                n.userId === 'all_' + user.role || 
                n.userId === 'all'

                offlineData.forEach(data => {
